<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>TBTFW // Sourcing</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Michroma&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  /* TBTFW BOARD DESIGN CONTRACT v1: pure black, white type, hairline rules,
     uppercase letterspaced eyebrows, // motif, monochrome verdicts,
     photography leads. Do not reskin without re-reading the contract. */
  :root {
    --bg: #000000;
    --panel: #0a0a0a;
    --line: #232323;
    --ink: #ffffff;
    --ink-dim: #8a8a8a;
    --metal: #c9c2b4;   /* the single permitted metallic accent */
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: Inter, -apple-system, system-ui, sans-serif;
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  a { color: inherit; }
  .display { font-family: Michroma, Inter, sans-serif; }
  .num { font-variant-numeric: tabular-nums; }

  /* ---------- header ---------- */
  header {
    position: sticky; top: 0; z-index: 20;
    background: rgba(0,0,0,.92);
    backdrop-filter: blur(6px);
    border-bottom: 1px solid var(--line);
    padding: 14px 16px;
    display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
  }
  header h1 {
    margin: 0; font-size: 15px; font-weight: 400;
    font-family: Michroma, sans-serif;
    letter-spacing: .18em; text-transform: uppercase;
  }
  header h1 .slash { color: var(--ink-dim); }
  .controls { display: flex; gap: 8px; margin-left: auto; align-items: center; }
  .pill {
    border: 1px solid var(--line); background: transparent;
    color: var(--ink-dim); border-radius: 0;
    padding: 6px 14px; font: 500 11px Inter, sans-serif;
    letter-spacing: .12em; text-transform: uppercase; cursor: pointer;
  }
  .pill.on { color: var(--bg); background: var(--ink); border-color: var(--ink); }
  .counts { color: var(--ink-dim); font-size: 11px; letter-spacing: .08em;
    text-transform: uppercase; width: 100%; text-align: right; }
  .pill:focus-visible, button:focus-visible, a:focus-visible, summary:focus-visible {
    outline: 1px solid var(--metal); outline-offset: 2px;
  }

  main { max-width: 1200px; margin: 0 auto; padding: 18px 16px 80px; }

  .eyebrow {
    display: flex; align-items: baseline; gap: 10px;
    font-family: Michroma, sans-serif; text-transform: uppercase;
    letter-spacing: .22em; font-size: 11px; color: var(--ink-dim);
    border-bottom: 1px solid var(--line);
    padding-bottom: 10px; margin: 30px 0 16px;
  }
  .eyebrow .n { color: var(--ink); }

  /* ---------- review lane ---------- */
  details.review { border: 1px solid var(--ink); background: var(--panel); }
  details.review summary {
    cursor: pointer; list-style: none; padding: 14px 16px;
    font-family: Michroma, sans-serif; text-transform: uppercase;
    letter-spacing: .18em; font-size: 12px;
    display: flex; align-items: center; gap: 10px;
  }
  details.review summary::-webkit-details-marker { display: none; }
  details.review summary .hint {
    color: var(--ink-dim); font-family: Inter; font-size: 11px;
    text-transform: none; letter-spacing: 0; margin-left: auto;
  }
  details.review .body { padding: 0 12px 12px; }
  details.review .grid { grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); }

  /* ---------- grid view ---------- */
  .grid {
    display: grid; gap: 18px;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  }
  .card {
    background: var(--panel); border: 1px solid var(--line);
    display: flex; flex-direction: column;
  }
  .card.hot { border-color: var(--ink); }
  .photo {
    position: relative; aspect-ratio: 16/10;
    background: #111 center/cover no-repeat;
  }
  .photo .badge {
    position: absolute; right: 10px; bottom: 10px;
    background: rgba(0,0,0,.72); color: var(--ink);
    font: 500 10px Inter, sans-serif; letter-spacing: .1em;
    text-transform: uppercase; padding: 4px 8px;
  }
  .photo .badge.new { left: 10px; right: auto; background: var(--ink); color: var(--bg); }
  .panel { padding: 16px; display: flex; flex-direction: column; gap: 8px; flex: 1; }
  .title {
    font-family: Michroma, sans-serif; font-size: 15px; line-height: 1.35;
    text-decoration: none; letter-spacing: .02em;
  }
  .title:hover { color: var(--metal); }
  .specs { color: var(--ink-dim); font-size: 12px; letter-spacing: .02em; }
  .specs span + span::before { content: "  //  "; color: var(--line); white-space: pre; }

  .chips { display: flex; gap: 6px; flex-wrap: wrap; }
  .chip {
    font: 600 9.5px Inter, sans-serif; letter-spacing: .12em; text-transform: uppercase;
    padding: 3px 8px; border: 1px solid var(--line); color: var(--ink-dim);
  }
  .chip.v-watch, .chip.v-chase { background: var(--ink); color: var(--bg); border-color: var(--ink); }
  .chip.v-flag { border-color: var(--ink); color: var(--ink); }
  .chip.v-pass { opacity: .6; }
  .chip.manual { border-color: var(--metal); color: var(--metal); }
  .chip.des { border-color: var(--metal); color: var(--metal); }
  .chip.drop { border-color: var(--ink-dim); color: var(--ink); }
  .undo { background: none; border: none; color: var(--ink-dim); font-size: 10px;
    text-decoration: underline; cursor: pointer; padding: 0 0 0 6px; }

  .why { color: var(--ink-dim); font-size: 12px; font-style: italic; }

  .priceline {
    margin-top: auto; padding-top: 10px;
    display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap;
  }
  .price { font-family: Michroma, sans-serif; font-size: 16px; letter-spacing: .04em; }
  .was { color: var(--ink-dim); text-decoration: line-through; font-size: 12px; }
  .cut { color: var(--metal); font-size: 12px; font-weight: 600; }

  .gauge { margin-top: 4px; }
  .gauge .band { position: relative; height: 2px; background: var(--line); }
  .gauge .tick { position: absolute; top: -4px; width: 2px; height: 10px; background: var(--ink); }
  .gauge .median { position: absolute; top: -2px; left: 50%; width: 1px; height: 6px; background: var(--ink-dim); }
  .gauge .lbl { display: flex; justify-content: space-between;
    color: var(--ink-dim); font-size: 10px; margin-top: 5px; letter-spacing: .04em; }

  .viewrow {
    border-top: 1px solid var(--line); margin-top: 12px; padding-top: 10px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .view-link {
    font: 500 10px Inter, sans-serif; letter-spacing: .28em;
    text-transform: uppercase; text-decoration: none; color: var(--ink);
  }
  .view-link:hover { color: var(--metal); }

  .actions { display: flex; gap: 8px; }
  .actions button {
    font: 600 10px Inter, sans-serif; letter-spacing: .14em; text-transform: uppercase;
    padding: 7px 14px; cursor: pointer; background: transparent;
    border: 1px solid var(--line); color: var(--ink);
  }
  .actions button.b-watch { background: var(--ink); color: var(--bg); border-color: var(--ink); }
  .actions button:disabled { opacity: .35; cursor: wait; }

  /* ---------- feed view (photo-first, single column) ---------- */
  .feed {
    max-width: 560px; margin: 0 auto;
    display: flex; flex-direction: column; gap: 26px;
  }
  .feed .card .photo { aspect-ratio: 4/3; }
  .feed .card .title { font-size: 16px; }
  .photo.nophoto { display: flex; align-items: center; justify-content: center; }
  .photo.nophoto .noph {
    color: var(--line); font-family: Michroma, sans-serif;
    font-size: 11px; letter-spacing: .3em; text-transform: uppercase;
  }

  .empty { color: var(--ink-dim); font-size: 12px; letter-spacing: .06em;
    text-transform: uppercase; padding: 14px 2px; }
  footer { color: var(--ink-dim); font-size: 10px; letter-spacing: .14em;
    text-transform: uppercase; text-align: center; margin-top: 44px; }
  .state { text-align: center; padding: 80px 20px; color: var(--ink-dim); }
  .state b { color: var(--ink); font-family: Michroma, sans-serif; font-weight: 400;
    letter-spacing: .1em; text-transform: uppercase; }

  @media (max-width: 700px) {
    .grid { grid-template-columns: 1fr; }
    .fthumb { width: 72px; height: 48px; }
    header { padding: 12px; }
  }
</style>
</head>
<body>

<header>
  <h1>TBTFW <span class="slash">//</span> SOURCING</h1>
  <div class="controls">
    <button class="pill on" id="viewGrid" aria-pressed="true">Grid</button>
    <button class="pill" id="viewFeed" aria-pressed="false">Feed</button>
    <button class="pill" id="passToggle" aria-pressed="false">Show all</button>
  </div>
  <div class="counts num" id="counts"></div>
</header>

<main id="app">
  <div class="state"><b>Loading</b></div>
</main>

<script>
(function () {
  "use strict";

  var API = "https://qymkzfhdneukffeilrhx.supabase.co/functions/v1/board";
  var K = new URLSearchParams(location.search).get("k") || "";
  var app = document.getElementById("app");
  var countsEl = document.getElementById("counts");
  var passToggle = document.getElementById("passToggle");
  var viewGridBtn = document.getElementById("viewGrid");
  var viewFeedBtn = document.getElementById("viewFeed");
  var showAll = false;
  var viewMode = "grid";
  var DATA = null;

  if (!K) {
    app.innerHTML = "<div class='state'><b>No key</b><br>Open this page with your saved board link (ends in ?k=&hellip;).</div>";
    return;
  }

  passToggle.addEventListener("click", function () {
    showAll = !showAll;
    passToggle.classList.toggle("on", showAll);
    passToggle.setAttribute("aria-pressed", showAll ? "true" : "false");
    passToggle.textContent = showAll ? "Hot only" : "Show all";
    if (DATA) render(DATA);
  });
  function setView(mode) {
    viewMode = mode;
    viewGridBtn.classList.toggle("on", mode === "grid");
    viewFeedBtn.classList.toggle("on", mode === "feed");
    viewGridBtn.setAttribute("aria-pressed", mode === "grid" ? "true" : "false");
    viewFeedBtn.setAttribute("aria-pressed", mode === "feed" ? "true" : "false");
    if (DATA) render(DATA);
  }
  viewGridBtn.addEventListener("click", function () { setView("grid"); });
  viewFeedBtn.addEventListener("click", function () { setView("feed"); });

  /* ---------- helpers ---------- */
  function esc(s) {
    return String(s == null ? "" : s)
      .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
  }
  function money(n) {
    if (n == null || isNaN(n)) return "&mdash;";
    return "$" + Number(n).toLocaleString("en-US", { maximumFractionDigits: 0 });
  }
  function miles(n) {
    if (n == null || isNaN(n)) return null;
    return Number(n).toLocaleString("en-US") + " mi";
  }
  function hoursAgo(iso) {
    if (!iso) return null;
    var ms = Date.now() - new Date(iso).getTime();
    if (isNaN(ms) || ms < 0) return null;
    var h = ms / 36e5;
    if (h < 1) return "under 1h ago";
    if (h < 48) return Math.round(h) + "h ago";
    var d = Math.round(h / 24);
    return d + "d ago";
  }
  function effVerdict(r) { return r.manual_verdict || r.ai_verdict || null; }
  function isHot(r) {
    var v = effVerdict(r);
    return v === "WATCH" || v === "CHASE" || v === "FLAG";
  }
  function isNew(r) {
    if (!r.first_seen_at) return false;
    return (Date.now() - new Date(r.first_seen_at).getTime()) <= 48 * 36e5;
  }
  function isDrop(r) {
    if (r.previous_price == null || r.price == null) return false;
    if (!(Number(r.price) < Number(r.previous_price))) return false;
    if (!r.price_changed_at) return false;
    return (Date.now() - new Date(r.price_changed_at).getTime()) <= 7 * 24 * 36e5;
  }
  function carName(r) {
    var parts = [];
    if (r.year) parts.push(r.year);
    if (r.make) parts.push(r.make);
    if (r.model) parts.push(r.model);
    if (r.trim) parts.push(r.trim);
    return parts.join(" ") || "Unknown car";
  }
  function specLine(r) {
    var parts = [];
    var m = miles(r.mileage);
    if (m) parts.push(m);
    if (r.exterior_color) parts.push(r.exterior_color);
    if (r.interior_color) parts.push(r.interior_color + " interior");
    if (!parts.length) return "";
    return "<div class='specs num'>" + parts.map(function (p) {
      return "<span>" + esc(p) + "</span>";
    }).join("") + "</div>";
  }

  /* ---------- shared fragments ---------- */
  function chipsHtml(r) {
    var out = [];
    var v = effVerdict(r);
    if (v) out.push("<span class='chip v-" + v.toLowerCase() + "'>" + esc(v) + "</span>");
    if (r.manual_verdict) out.push("<span class='chip manual'>your call" +
      "<button class='undo' data-undo='" + esc(r.id) + "'>undo</button></span>");
    if (r.desirability_tier === "exceptional" || r.desirability_tier === "notable") {
      out.push("<span class='chip des'>" + esc(r.desirability_tier) + "</span>");
    }
    if (isDrop(r)) out.push("<span class='chip drop'>price cut</span>");
    return out.length ? "<div class='chips'>" + out.join("") + "</div>" : "";
  }
  function gaugeHtml(r) {
    if (r.baseline_median == null || r.price == null) return "";
    if (r.adjusted_low == null || r.adjusted_high == null) return "";
    var lo = Number(r.adjusted_low), hi = Number(r.adjusted_high), p = Number(r.price);
    if (!(hi > lo)) return "";
    var pos = Math.max(0, Math.min(1, (p - lo) / (hi - lo)));
    var n = r.baseline_n != null ? " &middot; n=" + esc(r.baseline_n) : "";
    return "<div class='gauge' title='Ask vs adjusted comp range'>" +
      "<div class='band'><div class='median'></div>" +
      "<div class='tick' style='left:calc(" + (pos * 100).toFixed(1) + "% - 1px)'></div></div>" +
      "<div class='lbl num'><span>" + money(lo) + "</span>" +
      "<span>MED " + money(r.baseline_median) + n + "</span>" +
      "<span>" + money(hi) + "</span></div></div>";
  }
  function dropFrag(r) {
    if (!isDrop(r)) return "";
    var pct = Math.round((1 - Number(r.price) / Number(r.previous_price)) * 100);
    return "<span class='was num'>" + money(r.previous_price) + "</span>" +
      "<span class='cut num'>&minus;" + pct + "%</span>";
  }

  /* ---------- grid card (tbtfw.com card language) ---------- */
  function cardHtml(r, ctx) {
    var cls = "card" + (isHot(r) ? " hot" : "");
    var hasImg = !!r.image_url;
    var img = hasImg ? " style=\"background-image:url('" + esc(r.image_url) + "')\"" : "";
    var noph = hasImg ? "" : "<span class='noph'>No photo yet</span>";
    var seen = hoursAgo(r.first_seen_at);
    var newBadge = isNew(r) ? "<span class='badge new'>New</span>" : "";
    var seenBadge = seen ? "<span class='badge'>Discovered " + esc(seen) + "</span>" : "";
    var why = (r.desirability_why && r.desirability_tier)
      ? "<div class='why'>" + esc(r.desirability_why) + "</div>" : "";
    var tail;
    if (ctx === "review") {
      tail = "<div class='viewrow'><div class='actions'>" +
        "<button class='b-watch' data-verdict='WATCH' data-id='" + esc(r.id) + "'>Watch</button>" +
        "<button data-verdict='FLAG' data-id='" + esc(r.id) + "'>Flag</button>" +
        "<button data-verdict='PASS' data-id='" + esc(r.id) + "'>Pass</button>" +
        "</div><a class='view-link' href='" + esc(r.listing_url || "#") +
        "' target='_blank' rel='noopener'>View</a></div>";
    } else {
      tail = "<div class='viewrow'><span></span><a class='view-link' href='" +
        esc(r.listing_url || "#") + "' target='_blank' rel='noopener'>View Vehicle</a></div>";
    }
    return "<article class='" + cls + "'>" +
      "<div class='photo" + (hasImg ? "" : " nophoto") + "'" + img + ">" + noph + newBadge + seenBadge + "</div>" +
      "<div class='panel'>" +
        "<a class='title' href='" + esc(r.listing_url || "#") + "' target='_blank' rel='noopener'>" +
          esc(carName(r)) + "</a>" +
        specLine(r) +
        chipsHtml(r) + why +
        "<div class='priceline'><span class='price num'>" + money(r.price) + "</span>" +
          dropFrag(r) + "</div>" +
        gaugeHtml(r) + tail +
      "</div></article>";
  }

  /* ---------- render ---------- */
  function render(data) {
    DATA = data;
    var rows = Array.isArray(data.rows) ? data.rows : [];
    var review = Array.isArray(data.review_rows) ? data.review_rows : [];

    var shown = showAll ? rows : rows.filter(isHot);
    var watchN = rows.filter(function (r) {
      var v = effVerdict(r); return v === "WATCH" || v === "CHASE";
    }).length;
    var flagN = rows.filter(function (r) { return effVerdict(r) === "FLAG"; }).length;
    countsEl.innerHTML = watchN + " watch // " + flagN + " flag // " + rows.length + " active";

    var html = "";
    html += "<details class='review' open><summary>Needs your call" +
      " <span class='n num'>&nbsp;" + review.length + "</span>" +
      "<span class='hint'>year-gated, engine says look</span></summary><div class='body'>" +
      (review.length
        ? "<div class='grid'>" + review.map(function (r) { return cardHtml(r, "review"); }).join("") + "</div>"
        : "<div class='empty'>Queue is clear</div>") +
      "</div></details>";

    html += "<div class='eyebrow'>Live market // newest first" +
      " <span class='n num'>" + shown.length + "</span></div>";

    if (!shown.length) {
      html += "<div class='empty'>Nothing to show" +
        (showAll ? "" : " &mdash; no hot cars right now. Show all reveals the full market.") + "</div>";
    } else if (viewMode === "grid") {
      html += "<div class='grid'>" + shown.map(function (r) { return cardHtml(r, "main"); }).join("") + "</div>";
    } else {
      html += "<div class='feed'>" + shown.map(function (r) { return cardHtml(r, "main"); }).join("") + "</div>";
    }

    html += "<footer class='num'>" + esc(data.hidden_by_year_gate || 0) +
      " hidden by year gate // generated " + esc(hoursAgo(data.generated_at) || "just now") + "</footer>";

    app.innerHTML = html;
    wireButtons();
  }

  /* ---------- verdict actions ---------- */
  function setVerdict(id, verdict, btns) {
    btns.forEach(function (b) { b.disabled = true; });
    fetch(API + "?k=" + encodeURIComponent(K), {
      method: "POST",
      headers: { "content-type": "application/json" },
      body: JSON.stringify({ action: "set_verdict", id: id, verdict: verdict })
    }).then(function (res) {
      if (!res.ok) throw new Error("HTTP " + res.status);
      return res.json();
    }).then(function () {
      load();
    }).catch(function (err) {
      btns.forEach(function (b) { b.disabled = false; });
      alert("Verdict not saved (" + err.message + "). Check connection and try again.");
    });
  }
  function wireButtons() {
    Array.prototype.slice.call(app.querySelectorAll(".actions button")).forEach(function (b) {
      b.addEventListener("click", function () {
        var card = b.closest("article");
        var group = Array.prototype.slice.call(card.querySelectorAll(".actions button"));
        setVerdict(b.getAttribute("data-id"), b.getAttribute("data-verdict"), group);
      });
    });
    Array.prototype.slice.call(app.querySelectorAll(".undo")).forEach(function (u) {
      u.addEventListener("click", function () {
        setVerdict(u.getAttribute("data-undo"), null, [u]);
      });
    });
  }

  /* ---------- load ---------- */
  function load() {
    fetch(API + "?k=" + encodeURIComponent(K))
      .then(function (res) {
        if (res.status === 404) throw new Error("bad key");
        if (!res.ok) throw new Error("HTTP " + res.status);
        return res.json();
      })
      .then(render)
      .catch(function (err) {
        app.innerHTML = "<div class='state'><b>Board unavailable</b><br>" +
          esc(err.message === "bad key"
            ? "This link's key was not accepted. Use your saved board link."
            : "Could not reach the data API (" + err.message + "). Reload to try again.") +
          "</div>";
      });
  }

  load();
})();
</script>
</body>
</html>
