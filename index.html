<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>TBTFW Sourcing Board</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #16181c;          /* graphite */
    --panel: #1e2126;       /* card */
    --panel-2: #23262c;     /* compact row */
    --line: #2c3038;
    --ink: #e8e6e1;
    --ink-dim: #9a9da3;
    --gold: #d3b26a;        /* WATCH — pick up the phone */
    --gold-deep: #b3924a;
    --amber: #c98a3d;       /* FLAG */
    --steel: #6b7280;       /* PASS */
    --drop: #7fae7f;        /* price cut */
    --danger: #b45a5a;
    --radius: 10px;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: Inter, -apple-system, system-ui, sans-serif;
    font-size: 14px;
    line-height: 1.45;
    -webkit-font-smoothing: antialiased;
  }
  a { color: inherit; }

  .display { font-family: "Barlow Condensed", Inter, sans-serif; letter-spacing: .02em; }
  .num { font-variant-numeric: tabular-nums; }

  /* ---------- header ---------- */
  header {
    position: sticky; top: 0; z-index: 20;
    background: rgba(22,24,28,.94);
    backdrop-filter: blur(6px);
    border-bottom: 1px solid var(--line);
    padding: 10px 14px;
    display: flex; align-items: center; gap: 12px;
  }
  header h1 {
    margin: 0; font-size: 20px; font-weight: 700;
    font-family: "Barlow Condensed", sans-serif;
    text-transform: uppercase; letter-spacing: .08em;
  }
  header h1 span { color: var(--gold); }
  .counts { color: var(--ink-dim); font-size: 12px; margin-left: auto; text-align: right; }
  .toggle {
    border: 1px solid var(--line); background: var(--panel);
    color: var(--ink-dim); border-radius: 999px;
    padding: 5px 12px; font-size: 12px; font-weight: 600; cursor: pointer;
  }
  .toggle.on { color: var(--ink); border-color: var(--steel); }
  .toggle:focus-visible, button:focus-visible, a:focus-visible {
    outline: 2px solid var(--gold); outline-offset: 2px;
  }

  main { max-width: 760px; margin: 0 auto; padding: 12px 12px 60px; }

  /* ---------- sections ---------- */
  section { margin-top: 22px; }
  .eyebrow {
    display: flex; align-items: baseline; gap: 8px;
    font-family: "Barlow Condensed", sans-serif;
    text-transform: uppercase; letter-spacing: .14em;
    font-size: 13px; font-weight: 600; color: var(--ink-dim);
    border-bottom: 1px solid var(--line); padding-bottom: 6px; margin-bottom: 10px;
  }
  .eyebrow .n { color: var(--ink); }

  /* ---------- review lane ---------- */
  details.review { border: 1px solid var(--gold-deep); border-radius: var(--radius); background: #1c1a15; }
  details.review summary {
    cursor: pointer; list-style: none; padding: 10px 14px;
    font-family: "Barlow Condensed", sans-serif; text-transform: uppercase;
    letter-spacing: .12em; font-weight: 700; color: var(--gold);
    display: flex; align-items: center; gap: 8px;
  }
  details.review summary::-webkit-details-marker { display: none; }
  details.review summary .hint { color: var(--ink-dim); font-family: Inter; font-size: 11px;
    text-transform: none; letter-spacing: 0; font-weight: 400; margin-left: auto; }
  details.review .body { padding: 0 10px 10px; }

  /* ---------- cards ---------- */
  .card {
    display: flex; gap: 12px;
    background: var(--panel); border: 1px solid var(--line);
    border-radius: var(--radius); padding: 10px; margin-bottom: 10px;
  }
  .card.watch { border-color: var(--gold); box-shadow: 0 0 0 1px var(--gold) inset; }
  .card.chase { border-color: var(--gold); box-shadow: 0 0 0 2px var(--gold) inset; background: #201d16; }
  .card.flag  { border-color: var(--amber); }
  .thumb {
    width: 104px; height: 78px; flex: none; border-radius: 6px;
    background: var(--panel-2) center/cover no-repeat; border: 1px solid var(--line);
  }
  .info { min-width: 0; flex: 1; }
  .titleline { display: flex; gap: 8px; align-items: baseline; flex-wrap: wrap; }
  .title {
    font-family: "Barlow Condensed", sans-serif; font-weight: 600;
    font-size: 17px; line-height: 1.2; text-decoration: none;
  }
  .title:hover { color: var(--gold); }
  .meta { color: var(--ink-dim); font-size: 12px; margin-top: 2px; }
  .priceline { display: flex; align-items: baseline; gap: 8px; margin-top: 4px; flex-wrap: wrap; }
  .price { font-size: 16px; font-weight: 600; }
  .was { color: var(--ink-dim); text-decoration: line-through; font-size: 12px; }
  .cut { color: var(--drop); font-size: 12px; font-weight: 600; }

  .chips { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
  .chip {
    font-size: 10.5px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase;
    border-radius: 4px; padding: 2px 6px; border: 1px solid var(--line); color: var(--ink-dim);
  }
  .chip.v-watch { color: #16181c; background: var(--gold); border-color: var(--gold); }
  .chip.v-chase { color: #16181c; background: var(--gold); border-color: var(--gold); }
  .chip.v-flag  { color: #16181c; background: var(--amber); border-color: var(--amber); }
  .chip.v-pass  { color: var(--steel); }
  .chip.manual  { color: var(--gold); border-color: var(--gold-deep); }
  .chip.drop    { color: var(--drop); border-color: var(--drop); }
  .chip.des-exceptional { color: #16181c; background: #cdd6e4; border-color: #cdd6e4; }
  .chip.des-notable     { color: #cdd6e4; border-color: #55617a; }

  .why { color: var(--ink-dim); font-size: 12px; margin-top: 4px; font-style: italic; }

  /* ---------- delta gauge (signature) ---------- */
  .gauge { margin-top: 8px; }
  .gauge .band {
    position: relative; height: 4px; border-radius: 2px;
    background: linear-gradient(90deg, var(--drop), var(--steel) 50%, var(--danger));
    opacity: .85;
  }
  .gauge .tick {
    position: absolute; top: -3px; width: 2px; height: 10px;
    background: var(--ink); border-radius: 1px;
  }
  .gauge .median {
    position: absolute; top: -1px; left: 50%; width: 1px; height: 6px;
    background: var(--ink-dim);
  }
  .gauge .lbl { display: flex; justify-content: space-between; color: var(--ink-dim); font-size: 10px; margin-top: 3px; }

  /* ---------- verdict buttons (review lane + undo) ---------- */
  .actions { display: flex; gap: 8px; margin-top: 8px; }
  .actions button {
    font: 600 12px Inter, sans-serif; letter-spacing: .04em;
    border-radius: 6px; padding: 6px 14px; cursor: pointer;
    border: 1px solid var(--line); background: var(--panel-2); color: var(--ink);
  }
  .actions button.b-watch { border-color: var(--gold); color: var(--gold); }
  .actions button.b-flag  { border-color: var(--amber); color: var(--amber); }
  .actions button.b-pass  { color: var(--ink-dim); }
  .actions button:disabled { opacity: .4; cursor: wait; }
  .undo { background: none; border: none; color: var(--ink-dim); font-size: 11px;
    text-decoration: underline; cursor: pointer; padding: 0; margin-left: 6px; }

  /* ---------- compact PASS rows ---------- */
  .row {
    display: flex; gap: 10px; align-items: baseline;
    background: var(--panel-2); border: 1px solid transparent;
    border-radius: 6px; padding: 6px 10px; margin-bottom: 6px;
    color: var(--ink-dim); font-size: 13px;
  }
  .row .title { font-size: 14px; color: var(--ink-dim); }
  .row .price { margin-left: auto; font-size: 13px; font-weight: 500; }

  .empty { color: var(--ink-dim); font-size: 13px; padding: 6px 2px; }
  footer { color: var(--ink-dim); font-size: 11px; text-align: center; margin-top: 30px; }
  .state { text-align: center; padding: 60px 20px; color: var(--ink-dim); }
  .state b { color: var(--ink); }

  @media (max-width: 480px) {
    .thumb { width: 84px; height: 64px; }
    .title { font-size: 16px; }
  }
  @media (prefers-reduced-motion: no-preference) {
    .card { transition: border-color .15s ease; }
  }
</style>
</head>
<body>

<header>
  <h1>TBTFW <span>Sourcing</span></h1>
  <button class="toggle" id="passToggle" aria-pressed="false">Show all</button>
  <div class="counts num" id="counts"></div>
</header>

<main id="app">
  <div class="state" id="boot">Loading the board&hellip;</div>
</main>

<script>
(function () {
  "use strict";

  var API = "https://qymkzfhdneukffeilrhx.supabase.co/functions/v1/board";
  var K = new URLSearchParams(location.search).get("k") || "";
  var app = document.getElementById("app");
  var countsEl = document.getElementById("counts");
  var passToggle = document.getElementById("passToggle");
  var showAll = false;
  var DATA = null;

  if (!K) {
    app.innerHTML = "<div class='state'><b>No key.</b><br>Open this page with your board link (the one ending in ?k=&hellip;).</div>";
    return;
  }

  passToggle.addEventListener("click", function () {
    showAll = !showAll;
    passToggle.classList.toggle("on", showAll);
    passToggle.setAttribute("aria-pressed", showAll ? "true" : "false");
    passToggle.textContent = showAll ? "Hot only" : "Show all";
    if (DATA) render(DATA);
  });

  /* ---------- helpers ---------- */
  function esc(s) {
    return String(s == null ? "" : s)
      .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
  }
  function money(n) {
    if (n == null || isNaN(n)) return "&mdash;";
    return "$" + Number(n).toLocaleString("en-US", { maximumFractionDigits: 0 });
  }
  function miles(n) {
    if (n == null || isNaN(n)) return "mileage unknown";
    return Number(n).toLocaleString("en-US") + " mi";
  }
  function hoursAgo(iso) {
    if (!iso) return null;
    var ms = Date.now() - new Date(iso).getTime();
    if (isNaN(ms) || ms < 0) return null;
    var h = ms / 36e5;
    if (h < 1) return "under 1h ago";
    if (h < 48) return Math.round(h) + "h ago";
    var d = Math.round(h / 24);
    return d + "d ago";
  }
  function effVerdict(r) { return r.manual_verdict || r.ai_verdict || null; }
  function isNew(r) {
    if (!r.first_seen_at) return false;
    return (Date.now() - new Date(r.first_seen_at).getTime()) <= 48 * 36e5;
  }
  function isDrop(r) {
    if (r.previous_price == null || r.price == null) return false;
    if (!(Number(r.price) < Number(r.previous_price))) return false;
    if (!r.price_changed_at) return false;
    return (Date.now() - new Date(r.price_changed_at).getTime()) <= 7 * 24 * 36e5;
  }
  function carName(r) {
    var parts = [];
    if (r.year) parts.push(r.year);
    if (r.make) parts.push(r.make);
    if (r.model) parts.push(r.model);
    if (r.trim) parts.push(r.trim);
    return parts.join(" ") || "Unknown car";
  }

  /* ---------- rendering ---------- */
  function gaugeHtml(r) {
    if (r.baseline_median == null || r.price == null) return "";
    if (r.adjusted_low == null || r.adjusted_high == null) return "";
    var lo = Number(r.adjusted_low), hi = Number(r.adjusted_high), p = Number(r.price);
    if (!(hi > lo)) return "";
    var pos = (p - lo) / (hi - lo);
    pos = Math.max(0, Math.min(1, pos));
    var n = r.baseline_n != null ? " &middot; n=" + esc(r.baseline_n) : "";
    return "<div class='gauge' title='Ask vs adjusted comp range'>" +
      "<div class='band'><div class='median'></div>" +
      "<div class='tick' style='left:calc(" + (pos * 100).toFixed(1) + "% - 1px)'></div></div>" +
      "<div class='lbl num'><span>" + money(lo) + "</span>" +
      "<span>med " + money(r.baseline_median) + n + "</span>" +
      "<span>" + money(hi) + "</span></div></div>";
  }

  function chipsHtml(r, ctx) {
    var out = [];
    var v = effVerdict(r);
    if (v) out.push("<span class='chip v-" + v.toLowerCase() + "'>" + esc(v) + "</span>");
    if (r.manual_verdict) out.push("<span class='chip manual'>your call" +
      "<button class='undo' data-undo='" + esc(r.id) + "'>undo</button></span>");
    var seen = hoursAgo(r.first_seen_at);
    if (seen) out.push("<span class='chip'>discovered " + esc(seen) + "</span>");
    if (isDrop(r) && ctx !== "drops") out.push("<span class='chip drop'>price cut</span>");
    if (r.desirability_tier === "exceptional" || r.desirability_tier === "notable") {
      out.push("<span class='chip des-" + esc(r.desirability_tier) + "'>" + esc(r.desirability_tier) + "</span>");
    }
    return "<div class='chips'>" + out.join("") + "</div>";
  }

  function cardHtml(r, ctx) {
    var v = (effVerdict(r) || "").toLowerCase();
    var cls = "card" + (v === "watch" ? " watch" : v === "chase" ? " chase" : v === "flag" ? " flag" : "");
    var img = r.image_url ? " style=\"background-image:url('" + esc(r.image_url) + "')\"" : "";
    var drop = "";
    if (isDrop(r)) {
      var pct = Math.round((1 - Number(r.price) / Number(r.previous_price)) * 100);
      drop = "<span class='was num'>" + money(r.previous_price) + "</span>" +
             "<span class='cut num'>&minus;" + pct + "%</span>";
    }
    var why = (r.desirability_why && r.desirability_tier)
      ? "<div class='why'>" + esc(r.desirability_why) + "</div>" : "";
    var actions = "";
    if (ctx === "review") {
      actions = "<div class='actions'>" +
        "<button class='b-watch' data-verdict='WATCH' data-id='" + esc(r.id) + "'>Watch</button>" +
        "<button class='b-flag'  data-verdict='FLAG'  data-id='" + esc(r.id) + "'>Flag</button>" +
        "<button class='b-pass'  data-verdict='PASS'  data-id='" + esc(r.id) + "'>Pass</button>" +
        "</div>";
    }
    return "<article class='" + cls + "'>" +
      "<div class='thumb'" + img + "></div>" +
      "<div class='info'>" +
        "<div class='titleline'><a class='title display' href='" + esc(r.listing_url || "#") +
          "' target='_blank' rel='noopener'>" + esc(carName(r)) + "</a></div>" +
        "<div class='meta num'>" + miles(r.mileage) + "</div>" +
        "<div class='priceline'><span class='price num'>" + money(r.price) + "</span>" + drop + "</div>" +
        chipsHtml(r, ctx) + why + gaugeHtml(r) + actions +
      "</div></article>";
  }

  function rowHtml(r) {
    return "<div class='row'>" +
      "<a class='title' href='" + esc(r.listing_url || "#") + "' target='_blank' rel='noopener'>" +
      esc(carName(r)) + "</a>" +
      "<span class='num'>" + miles(r.mileage) + "</span>" +
      "<span class='price num'>" + money(r.price) + "</span></div>";
  }

  function sectionHtml(label, items, ctx) {
    var inner;
    if (!items.length) {
      inner = "<div class='empty'>Nothing here right now.</div>";
    } else {
      inner = items.map(function (r) {
        var v = effVerdict(r);
        var hot = v === "WATCH" || v === "CHASE" || v === "FLAG";
        return (hot || showAll || ctx === "review") ? cardHtml(r, ctx) : rowHtml(r);
      }).join("");
    }
    return "<section><div class='eyebrow'>" + label +
      " <span class='n num'>" + items.length + "</span></div>" + inner + "</section>";
  }

  function visible(items) {
    if (showAll) return items;
    return items.filter(function (r) {
      var v = effVerdict(r);
      return v === "WATCH" || v === "CHASE" || v === "FLAG";
    });
  }

  function render(data) {
    DATA = data;
    var rows = Array.isArray(data.rows) ? data.rows : [];
    var review = Array.isArray(data.review_rows) ? data.review_rows : [];

    var fresh = [], drops = [], older = [];
    rows.forEach(function (r) {
      if (isNew(r)) fresh.push(r);
      else if (isDrop(r)) drops.push(r);
      else older.push(r);
    });

    var watchN = rows.filter(function (r) { var v = effVerdict(r); return v === "WATCH" || v === "CHASE"; }).length;
    var flagN = rows.filter(function (r) { return effVerdict(r) === "FLAG"; }).length;
    countsEl.innerHTML = watchN + " watch &middot; " + flagN + " flag &middot; " + rows.length + " active";

    var html = "";
    html += "<details class='review' open><summary>Needs your call" +
      " <span class='n num'>" + review.length + "</span>" +
      "<span class='hint'>year-gated, engine says look</span></summary><div class='body'>" +
      (review.length ? review.map(function (r) { return cardHtml(r, "review"); }).join("")
                     : "<div class='empty'>Queue is clear.</div>") +
      "</div></details>";

    html += sectionHtml("New &middot; last 48h", visible(fresh), "new");
    html += sectionHtml("Price drops &middot; 7d", visible(drops), "drops");
    html += sectionHtml("Older", visible(older), "older");

    html += "<footer class='num'>" + esc(data.hidden_by_year_gate || 0) +
      " hidden by year gate &middot; generated " + esc(hoursAgo(data.generated_at) || "just now") + "</footer>";

    app.innerHTML = html;
    wireButtons();
  }

  /* ---------- verdict actions ---------- */
  function setVerdict(id, verdict, btns) {
    btns.forEach(function (b) { b.disabled = true; });
    fetch(API + "?k=" + encodeURIComponent(K), {
      method: "POST",
      headers: { "content-type": "application/json" },
      body: JSON.stringify({ action: "set_verdict", id: id, verdict: verdict })
    }).then(function (res) {
      if (!res.ok) throw new Error("HTTP " + res.status);
      return res.json();
    }).then(function () {
      load();
    }).catch(function (err) {
      btns.forEach(function (b) { b.disabled = false; });
      alert("Verdict not saved (" + err.message + "). Check connection and try again.");
    });
  }

  function wireButtons() {
    var btns = Array.prototype.slice.call(app.querySelectorAll(".actions button"));
    btns.forEach(function (b) {
      b.addEventListener("click", function () {
        var card = b.closest("article");
        var group = Array.prototype.slice.call(card.querySelectorAll(".actions button"));
        setVerdict(b.getAttribute("data-id"), b.getAttribute("data-verdict"), group);
      });
    });
    Array.prototype.slice.call(app.querySelectorAll(".undo")).forEach(function (u) {
      u.addEventListener("click", function () {
        setVerdict(u.getAttribute("data-undo"), null, [u]);
      });
    });
  }

  /* ---------- load ---------- */
  function load() {
    fetch(API + "?k=" + encodeURIComponent(K))
      .then(function (res) {
        if (res.status === 404) throw new Error("bad key");
        if (!res.ok) throw new Error("HTTP " + res.status);
        return res.json();
      })
      .then(render)
      .catch(function (err) {
        app.innerHTML = "<div class='state'><b>Board unavailable.</b><br>" +
          esc(err.message === "bad key"
            ? "This link's key was not accepted. Use your saved board link."
            : "Could not reach the data API (" + err.message + "). Pull to refresh or try again.") +
          "</div>";
      });
  }

  load();
})();
</script>
</body>
</html>
